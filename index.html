<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Finance Panel</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>


<div class="layout">


    <!-- SIDEBAR -->
    <aside class="sidebar">


        <div class="logo">
            💰 FINANCE
        </div>


        <nav>


            <a class="active">
                🏠 Dashboard
            </a>



            <div class="menu-title">
                MASTER
            </div>


            <a onclick="showPage('bankPage')">
                🏦 Bank
            </a>


            <a>
                📂 Category
            </a>



            <div class="menu-title">
                TRANSACTION
            </div>


            <a>
                💵 Income
            </a>


            <a>
                💸 Expense
            </a>



            <a>
                🔄 Transfer
            </a>



            <div class="menu-title">
                REPORT
            </div>


            <a>
                📊 Report
            </a>


        </nav>


    </aside>





    <!-- MAIN -->

    <main class="main">



        <header class="header">

            <h1>
                Dashboard
            </h1>


            <div class="profile">
                NICKY
            </div>


        </header>






        <!-- DASHBOARD AREA -->

        <div id="dashboardPage">



            <!-- SUMMARY -->

            <section class="cards" id="dashboardCards">


                <div class="card">

                    <p>
                        Total Saldo
                    </p>


                    <h2 id="totalSaldo">
                        Rp 0
                    </h2>

                </div>




                <div class="card">

                    <p>
                        Total Income
                    </p>


                    <h2 id="totalIncome">
                        Rp 0
                    </h2>

                </div>





                <div class="card">

                    <p>
                        Total Expense
                    </p>


                    <h2 id="totalExpense">
                        Rp 0
                    </h2>

                </div>


            </section>








            <!-- CONTENT -->

            <section class="grid" id="dashboardGrid">



                <div class="panel">


                    <h3>
                        Saldo Bank
                    </h3>



                    <div id="bankList">

                        Loading...

                    </div>



                </div>






                <div class="panel">


                    <h3>
                        Recent Transaction
                    </h3>



                    <div id="transactionList">

                        Loading...

                    </div>



                </div>



            </section>



        </div>










        <!-- BANK PAGE -->

        <section id="bankPage" style="display:none;">



            <div class="panel">



                <h3>
                    Bank
                </h3>



                <div id="bankPageList">

                    Loading...

                </div>



            </div>



        </section>






    </main>




</div>





<script src="app.js"></script>


</body>

</html>
